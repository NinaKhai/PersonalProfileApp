<!DOCTYPE html>
<html>

<head>

<title>Contact Page</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

        body{
            font-family: Arial;
            background-image: url('contactpage.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            padding: 20px;
        }

        .container{
            width: 50%;
            margin: auto;
            background: rgba(255,255,255,0.85);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 0px 10px gray;
            border: 4px solid #14b8a6;
        }

        h1{
            text-align: center;
            color: #14b8a6;
        }

        label{
            font-weight: bold;
        }

        input, textarea{
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 2px solid #5eead4;
            outline: none;
            transition: 0.3s;
        }
        
        input:focus, textarea:focus{
            border-color: #14b8a6;
            box-shadow: 0px 0px 8px #99f6e4;
            }

        input[type=submit]{
            background-color: #14b8a6;
            color: white;
            border: none;
            cursor: pointer;
        }

        .btn-home{
            display: inline-block;
            margin-top: 15px;
            padding: 12px 22px;
            background-color: #2563eb;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-home:hover{
            background-color: #1e40af;
            transform: scale(1.05);
        }

</style>

</head>

<body>

<div class="container">

<h1>Contact Information Form</h1>

<form action="ContactServlet" method="POST">

<label><i class="fa fa-phone"></i> Phone Number:</label>
<input type="text" name="phone">

<label><i class="fa fa-location-dot"></i> Address:</label>
<textarea name="address"></textarea>

<label><i class="fa fa-user-shield"></i> Emergency Contact:</label>
<input type="text" name="emergency">

<input type="submit" value="Submit Contact">

</form>

<br>

<a href="index.html" class="btn-home">
    <i class="fa fa-home"></i> Back to Homepage
</a>

</div>

</body>
</html>
